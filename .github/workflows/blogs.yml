name: Blogs
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          feed_list: "https://www.google.com/alerts/feeds/05324308528204330543/1556681585692644457"
          max_post_count: "6"
          commit_message: "📝 Latest Google News"
          committer_username: "jisannation"
          committer_email: "230176000+jisannation@users.noreply.github.com"
