name: Videos
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: DenverCoder1/github-readme-youtube-cards@main
        with:
          comment_tag_name: VID
          channel_id: UCK8sQmJBp8GCxrOtXWBpyEA
          lang: en
          max_videos: 6
          card_width: 250
          commit_message: "🎥 Latest Google Videos"
          youtube_api_key: ${{ secrets.YOUTUBE_API_KEY }}
          show_duration: true
          author_name: "jisannation"
          author_email: "230176000+jisannation@users.noreply.github.com"
          base_url: https://ytcards.demolab.com/
          background_color: "#0d1117"
          title_color: "#ffffff"
          stats_color: "#dedede"
          theme_context_light: '{ "background_color": "#ffffff", "title_color": "#24292f", "stats_color": "#57606a" }'
          theme_context_dark: '{ "background_color": "#0d1117", "title_color": "#ffffff", "stats_color": "#dedede" }'
          readme_path: README.md
          output_only: false
          output_type: html
