name: Videos
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fetch YouTube Search Results and Update README
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        shell: python
        run: |
          import os
          import re
          import urllib.request
          import urllib.parse
          import json
          import html

          api_key = os.environ.get("YOUTUBE_API_KEY")
          if not api_key:
              print("YOUTUBE_API_KEY missing in GitHub Secrets.")
              exit(1)

          # Your preferred search query
          query = "artificial intelligence"
          encoded_query = urllib.parse.quote(query)
          
          # YouTube API endpoint
          url = f"https://www.googleapis.com/youtube/v3/search?part=snippet&q={encoded_query}&maxResults=6&type=video&key={api_key}"

          try:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode("utf-8"))
          except Exception as e:
              print(f"YouTube API Error: {e}")
              exit(1)

          items = data.get("items", [])
          if not items:
              print("No videos found.")
              exit(0)

          # Generate an HTML Table formatted in a 3-column grid
          html_content = "\n<!-- BEGIN VID -->\n"
          html_content += "<table align=\"center\">\n"
          
          rows = []
          current_row = []
          for i, item in enumerate(items):
              video_id = item["id"].get("videoId")
              if not video_id:
                  continue
              title = html.unescape(item["snippet"]["title"])
              channel_title = html.unescape(item["snippet"]["channelTitle"])
              thumbnail_url = f"https://img.youtube.com/vi/{video_id}/mqdefault.jpg"
              title_escaped = title.replace("\"", "&quot;")
              
              cell = f"""    <td valign="top" width="250" style="padding: 10px;">
        <a href="https://www.youtube.com/watch?v={video_id}" target="_blank">
          <img src="{thumbnail_url}" width="250" style="border-radius: 8px;" alt="{title_escaped}"/>
        </a><br/>
        <a href="https://www.youtube.com/watch?v={video_id}" target="_blank" style="text-decoration: none; color: #58a6ff; font-weight: bold; font-family: sans-serif; font-size: 14px;">
          {title}
        </a><br/>
        <small style="color: #8b949e; font-family: sans-serif;">{channel_title}</small>
      </td>"""
              current_row.append(cell)
              
              if len(current_row) == 3:
                  rows.append(current_row)
                  current_row = []
          
          if current_row:
              rows.append(current_row)
              
          for row in rows:
              html_content += "  <tr>\n"
              for cell in row:
                  html_content += cell + "\n"
              html_content += "  </tr>\n"
              
          html_content += "</table>\n"
          html_content += "<!-- END VID -->"

          readme_path = "README.md"
          if not os.path.exists(readme_path):
              print("README.md not found.")
              exit(1)

          with open(readme_path, "r", encoding="utf-8") as f:
              readme_content = f.read()

          pattern = re.compile(r"<!-- BEGIN VID -->.*?<!-- END VID -->", re.DOTALL)
          if pattern.search(readme_content):
              new_readme_content = pattern.sub(html_content, readme_content)
              with open(readme_path, "w", encoding="utf-8") as f:
                  f.write(new_readme_content)
              print("README.md updated successfully.")
          else:
              print("Placeholder tags <!-- BEGIN VID --> and <!-- END VID --> not found in README.md.")

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🎥 Update YouTube Search Results" || echo "No changes to commit"
          git push
