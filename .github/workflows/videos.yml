name: Videos
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install youtube-search-python "httpx<0.28"

      - name: Fetch YouTube Search Results and Update README
        shell: python
        run: |
          import os
          import re
          import html
          from datetime import datetime, timedelta
          from youtubesearchpython import VideosSearch

          # Calculate yesterday's date dynamically to limit results to the last 24 hours
          time_threshold = datetime.now() - timedelta(days=1)
          date_string = time_threshold.strftime("%Y-%m-%d")
          
          # Build search query (e.g., "artificial intelligence after:2026-06-13")
          query = f"artificial intelligence after:{date_string}"
          print(f"Using query: {query}")

          # Fetch search results
          try:
              videos_search = VideosSearch(query, limit=6)
              results = videos_search.result()
          except Exception as e:
              print(f"Error fetching YouTube results: {e}")
              exit(1)

          items = results.get("result", [])
          if not items:
              print("No videos found.")
              exit(0)

          # Generate an HTML Table formatted in a 3-column grid
          html_content = "\n<!-- BEGIN VID -->\n"
          html_content += "<table align=\"center\">\n"
          
          rows = []
          current_row = []
          for i, item in enumerate(items):
              video_id = item.get("id")
              if not video_id:
                  continue
              title = html.unescape(item.get("title", ""))
              
              # Extract channel name from channel dictionary
              channel_dict = item.get("channel", {})
              channel_title = ""
              if isinstance(channel_dict, dict):
                  channel_title = html.unescape(channel_dict.get("name", ""))
              
              thumbnail_url = f"https://img.youtube.com/vi/{video_id}/mqdefault.jpg"
              title_escaped = title.replace("\"", "&quot;")
              
              # Extract duration, views, and publish time
              duration = item.get("duration", "N/A")
              publish_time = item.get("publishedTime", "").strip()
              
              views = ""
              view_count_dict = item.get("viewCount", {})
              if isinstance(view_count_dict, dict):
                  views = view_count_dict.get("text", "").strip()
              
              # Format details string
              details_parts = []
              if views:
                  details_parts.append(views)
              if publish_time:
                  details_parts.append(publish_time)
              if duration:
                  details_parts.append(f"Duration: {duration}")
                  
              details_text = " &bull; ".join(details_parts)
              
              cell = f"""    <td valign="top" width="250" style="padding: 10px;">
                <a href="https://www.youtube.com/watch?v={video_id}" target="_blank">
                  <img src="{thumbnail_url}" width="250" style="border-radius: 8px;" alt="{title_escaped}"/>
                </a><br/>
                <a href="https://www.youtube.com/watch?v={video_id}" target="_blank" style="text-decoration: none; color: #58a6ff; font-weight: bold; font-family: sans-serif; font-size: 14px;">
                  {title}
                </a><br/>
                <small style="color: #8b949e; font-family: sans-serif; font-size: 12px; line-height: 1.5;">
                  {channel_title}<br/>
                  {details_text}
                </small>
              </td>"""
              current_row.append(cell)
              
              if len(current_row) == 3:
                  rows.append(current_row)
                  current_row = []
          
          if current_row:
              rows.append(current_row)
              
          for row in rows:
              html_content += "  <tr>\n"
              for cell in row:
                  html_content += cell + "\n"
              html_content += "  </tr>\n"
              
          html_content += "</table>\n"
          html_content += "<!-- END VID -->"

          readme_path = "README.md"
          if not os.path.exists(readme_path):
              print("README.md not found.")
              exit(1)

          with open(readme_path, "r", encoding="utf-8") as f:
              readme_content = f.read()

          pattern = re.compile(r"<!-- BEGIN VID -->.*?<!-- END VID -->", re.DOTALL)
          if pattern.search(readme_content):
              new_readme_content = pattern.sub(html_content, readme_content)
              with open(readme_path, "w", encoding="utf-8") as f:
                  f.write(new_readme_content)
              print("README.md updated successfully.")
          else:
              print("Placeholder tags <!-- BEGIN VID --> and <!-- END VID --> not found in README.md.")

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🎥 Update YouTube Search Results" || echo "No changes to commit"
          git push
